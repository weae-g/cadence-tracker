# =============================================================================
# Cadence — конфигурация nginx БЕЗ HTTPS (раздача по http://).
#
# Используйте, только если TLS пока недоступен. Минусы: трафик и cookie сессии
# идут в открытом виде (их можно перехватить в сети). Как только появится домен/
# сертификат — переходите на deploy/nginx.conf (с HTTPS).
#
# ВАЖНО для этого режима:
#   • в server/.env поставьте COOKIE_SECURE=false (иначе cookie не уйдёт по http);
#   • заголовок HSTS НЕ ставим (он требует HTTPS);
#   • шифрованный ZIP документов в браузере по http:// на не-localhost может не
#     работать (нужен Web Crypto, доступный только в защищённом контексте).
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;                          # ← домен или IP сервера

    # --- Заголовки безопасности (без HSTS — он только для HTTPS) ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # --- Статика фронтенда (собранный dist/) ---
    root /var/www/cadence/dist;             # ← путь к собранному фронтенду
    index index.html;

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Сервер авторизации ---
    location /api/ {
        proxy_pass http://127.0.0.1:3001;   # ← порт сервера авторизации
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 1m;
}
