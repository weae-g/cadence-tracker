# =============================================================================
# Cadence — пример конфигурации nginx для безопасной раздачи в интернете.
#
#  • Принудительный HTTPS (редирект с 80 на 443)
#  • Заголовки безопасности (HSTS, CSP, X-Frame-Options и др.)
#  • Статика фронтенда из dist/ (SPA-фоллбэк на index.html)
#  • Прокси /api/ на сервер авторизации (server/, порт 3001)
#
# Замените server_name и пути к сертификатам на свои.
# =============================================================================

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cadence.example.com;        # ← ваш домен

    # Для получения/продления Let's Encrypt (если используете certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cadence.example.com;        # ← ваш домен

    # --- TLS ---
    ssl_certificate     /etc/letsencrypt/live/cadence.example.com/fullchain.pem;   # ← ваш сертификат
    ssl_certificate_key /etc/letsencrypt/live/cadence.example.com/privkey.pem;     # ← ваш ключ
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Заголовки безопасности ---
    # HSTS: только HTTPS на год (+ поддомены). Включайте, когда HTTPS точно работает.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Запрет встраивания в <iframe> (кликджекинг)
    add_header X-Frame-Options "DENY" always;
    # Запрет «угадывания» MIME-типа
    add_header X-Content-Type-Options "nosniff" always;
    # Не утекать Referer на сторонние сайты
    add_header Referrer-Policy "no-referrer" always;
    # Отключаем лишние браузерные возможности
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # Content-Security-Policy: всё только со своего источника.
    # 'unsafe-inline' для style — приложение использует инлайновые стили (style={...}).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # --- Статика фронтенда (собранный dist/) ---
    root /var/www/cadence/dist;             # ← путь к собранному фронтенду
    index index.html;

    # Хешированные ассеты можно кэшировать надолго
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA: любой неизвестный путь отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Сервер авторизации ---
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Куки сессии проходят как есть (httpOnly + Secure ставит сервер)
        proxy_pass_request_headers on;
    }

    # Ограничение размера тела запроса (логин — мелочь)
    client_max_body_size 1m;
}
